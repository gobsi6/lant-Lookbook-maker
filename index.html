<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>룩북 캐릭터 시트 메이커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#1E1E1E;
    --ink-soft:#8A887F;
    --ink-text:#4A4842;
    --paper:#FAFAF8;
    --stage-bg-image:none;
    --stage-bg-blur:0px;
    --stage-bg-opacity:1;
    --bg-pattern:none;
    --bg-pattern-size:22px 22px;
    --line:#DEDBD2;
    --panel-head:#F0EEE7;
    --panel-head-text:#1E1E1E;
    --panel-bg:#FFFFFF;
    --frame:#E4E4E1;
    --accent:#33465F;
    --accent-soft:#E7EAF0;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:#EDEBE4;
    color:var(--ink-text);
    font-family:'Pretendard', sans-serif;
    min-height:100vh;
  }

  /* ---------- Top bar (same collapse pattern as the 네모네모/란트 makers) ---------- */
  .topbar{
    display:flex; align-items:center; flex-wrap:wrap; gap:14px; row-gap:12px;
    padding:16px 32px 16px 76px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
    position:sticky; top:0; z-index:50;
    max-height:400px;
    transition:max-height .25s ease, padding-top .2s ease, padding-bottom .2s ease, border-color .2s ease;
  }
  body.menu-collapsed .topbar{
    max-height:0; padding-top:0; padding-bottom:0; overflow:hidden; border-bottom-width:0;
  }
  .topbar-toggle-btn{
    position:fixed; top:19px; left:32px;
    display:flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:7px;
    border:1px solid var(--line); background:#fff; color:var(--ink-soft);
    cursor:pointer; z-index:60;
    transition:background .12s ease, color .12s ease;
  }
  .topbar-toggle-btn:hover{ background:var(--accent-soft); color:var(--accent); }
  .topbar-toggle-btn svg{ display:block; transition:transform .2s ease; }
  body.menu-collapsed .topbar-toggle-btn svg{ transform:rotate(-180deg); }
  .brand{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; row-gap:6px; }
  .brand .mark{ font-weight:800; font-size:19px; letter-spacing:-.01em; white-space:nowrap; }
  .brand .mark span{ color:var(--accent); }
  .version-badge{
    font-weight:700; font-size:12px; letter-spacing:.01em; color:var(--accent);
    background:var(--accent-soft); padding:3px 10px; border-radius:999px; white-space:nowrap;
  }
  .actions{ display:flex; flex-wrap:wrap; gap:10px; row-gap:8px; align-items:center; justify-content:flex-end; margin-left:auto; }
  button.primary{
    font-family:'Pretendard', sans-serif; font-weight:600; font-size:14px;
    background:var(--ink); color:#fff; border:none; padding:11px 22px; border-radius:10px;
    cursor:pointer; white-space:nowrap; box-shadow:0 2px 8px rgba(30,30,30,.18);
    transition:transform .12s ease, background .12s ease; display:inline-flex; align-items:center; gap:7px;
  }
  button.primary:hover{ background:var(--accent); }
  button.primary:active{ transform:scale(0.97); }
  button.ghost{
    font-family:'Pretendard', sans-serif; font-size:13px; font-weight:500;
    background:transparent; color:var(--ink-soft); border:1px solid var(--line);
    padding:10px 16px; border-radius:10px; cursor:pointer; white-space:nowrap;
    transition:border-color .12s ease, color .12s ease; display:inline-flex; align-items:center; gap:7px;
  }
  button.ghost:hover{ border-color:var(--accent); color:var(--accent); }
  button.ghost.active{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
  .btn-icon{ flex-shrink:0; }
  @media (max-width: 860px){
    .toolbar-btn{ padding:10px; gap:0; }
    .toolbar-btn .btn-label{ display:none; }
  }

  /* ---------- Stage ---------- */
  .stage-wrap{ display:flex; justify-content:safe center; padding:48px 24px 80px; overflow-x:auto; }
  #stage{
    width:1400px; flex:0 0 1400px;
    background-color:var(--paper);
    background-image:var(--bg-pattern, none);
    background-size:var(--bg-pattern-size, 22px 22px);
    padding:52px;
  }
  .stage-bg-clip{
    position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  .stage-bg-layer{
    position:absolute;
    /* oversized beyond the clip box by ~3x the blur radius so the blur has real
       image pixels to sample near the edge instead of fading toward transparency;
       at blur:0 this collapses back to inset:0 with no visual change. */
    inset:calc(var(--stage-bg-blur, 0px) * -3);
    background-image:var(--stage-bg-image);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    filter:blur(var(--stage-bg-blur));
    opacity:var(--stage-bg-opacity);
  }
  .layout{ display:flex; gap:24px; align-items:flex-start; position:relative; z-index:1; }

  /* ---- shared panel chrome ---- */
  .panel{ border:1px solid var(--ink); border-radius:8px; overflow:hidden; background:var(--panel-bg, #FFFFFF); }
  .panel-head{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; padding:11px 22px; color:var(--panel-head-text);
    border-bottom:1px solid var(--panel-head-text); background:var(--panel-head);
  }
  .panel-head .item-count{ color:var(--panel-head-text); opacity:.65; text-transform:none; letter-spacing:0; margin-left:6px; }

  /* ---- profile panel ---- */
  .profile-panel{ width:270px; flex:0 0 270px; }
  .profile-panel .panel-body{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    gap:14px; padding:24px 20px;
  }
  /* Always its own vertical stack — regardless of whether panel-body itself
     is arranged as a column (profile on top of the grid) or a row (profile
     beside it), the name/tag/description always line-break onto separate
     lines rather than being laid out as siblings of the row/column switch. */
  .profile-text{ display:flex; flex-direction:column; gap:6px; min-width:0; }
  .p-name{ font-size:22px; font-weight:800; }
  .p-tag{ font-family:'Pretendard', sans-serif; font-size:13.5px; font-weight:600; color:var(--ink-soft); letter-spacing:.02em; }
  .p-desc{ font-size:13.5px; line-height:1.55; color:var(--ink-text); }

  /* ---- outfit panel ---- */
  .outfit-panel{ flex:1 1 auto; min-width:0; }
  .out-grid{
    display:grid;
    grid-template-columns:repeat(var(--outfit-cols, 3), 1fr);
    gap:22px; padding:22px; align-items:start;
  }
  .card{ display:flex; flex-direction:column; position:relative; min-width:0; }
  .card-remove{
    position:absolute; top:-10px; right:-10px; z-index:6;
    width:22px; height:22px; border-radius:50%;
    background:#fff; border:1px solid var(--line); color:var(--ink-soft);
    display:none; align-items:center; justify-content:center; cursor:pointer; font-size:13px;
  }
  .card:hover .card-remove{ display:flex; }
  .card-remove:hover{ border-color:var(--accent); color:var(--accent); }
  .item-meta{ margin-top:12px; }
  .item-label{ font-size:15.5px; font-weight:700; margin-bottom:8px; }

  /* ---- editable text fields (shared) ---- */
  .editable{ outline:none; cursor:text; border-radius:4px; }
  .editable:hover, .editable:focus{ background:rgba(51,70,95,.06); box-shadow:0 0 0 3px rgba(51,70,95,.06); }
  .editable:empty::before{ content:attr(data-default); color:var(--ink-soft); opacity:.55; }

  /* ---- add-item card ---- */
  .add-item-card{
    border:1.5px dashed var(--line); border-radius:8px;
    width:52px; height:52px;
    justify-self:start; align-self:start;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink-soft); cursor:pointer; background:transparent;
    font-size:22px; font-weight:400; line-height:1;
    transition:border-color .12s ease, color .12s ease;
  }
  .add-item-card:hover{ border-color:var(--accent); color:var(--accent); }

  /* ---------- Image slots (upload + crop), same generic system as the other makers ---------- */
  .img-slot{
    position:relative;
    background:var(--slot, var(--frame));
    border-radius:4px;
    overflow:hidden;
    cursor:pointer;
    flex:0 0 auto;
  }
  .img-slot.square{ width:var(--profile-size, 220px); height:var(--profile-size, 220px); }
  .img-slot.tall{ width:100%; height:var(--outfit-h, 530px); border:1px solid var(--ink); }
  .img-slot .placeholder{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:8px;
    color:var(--ink-soft); text-align:center; font-weight:600; font-size:13px; line-height:1.4;
    pointer-events:none;
  }
  .img-slot .placeholder .plus{
    width:34px; height:34px; border:2px dashed var(--line); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:2px;
  }
  .img-slot .hover-bar{
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(0,0,0,.55); color:#fff; font-size:12px; font-weight:500;
    padding:8px 0; text-align:center; opacity:0; transition:opacity .15s ease;
  }
  .img-slot:hover .hover-bar{ opacity:1; }
  .img-slot .clear-btn{
    position:absolute; top:8px; right:8px; width:24px; height:24px; line-height:1; padding-bottom:2px;
    border-radius:50%; background:rgba(0,0,0,.55); color:#fff; font-size:14px;
    display:none; align-items:center; justify-content:center; cursor:pointer; z-index:5;
  }
  .img-slot.has-img .clear-btn{ display:flex; }
  .item-no{
    position:absolute; top:8px; left:8px; z-index:5;
    font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600;
    color:#fff; background:rgba(0,0,0,.4); padding:3px 7px; border-radius:3px; letter-spacing:.02em;
    display:inline-flex; align-items:center; justify-content:center; line-height:1;
  }
  /* Nudge just the text down 1px rather than the badge box itself, matching
     the same optical-centering technique used for the 네모네모 페어틀 badges. */
  .item-no-text{ pointer-events:none; position:relative; top:0.5px; }
  .img-slot .slot-caption{
    position:absolute; right:4px; bottom:8px; left:auto; z-index:4;
    max-width:calc(100% - 8px); margin:0; padding:4px 10px;
    background:rgba(0,0,0,.55); border:none; border-radius:8px; color:#fff;
    font-family:'Pretendard', sans-serif; font-size:12px; font-weight:500; line-height:16px;
    text-align:right; white-space:nowrap; overflow:hidden; cursor:text;
    opacity:0; pointer-events:none; transition:opacity .12s ease, bottom .12s ease;
  }
  .img-slot:hover .slot-caption, .img-slot .slot-caption:focus{ bottom:36px; }
  .img-slot:hover .slot-caption,
  .img-slot .slot-caption:focus,
  .img-slot .slot-caption.has-text{
    opacity:1; pointer-events:auto;
  }
  .img-slot .slot-caption:empty::before{ content:attr(data-placeholder); opacity:.75; }
  body.exporting .img-slot .slot-caption:not(.has-text){ display:none !important; }
  .img-slot .crop-btn{
    position:absolute; top:8px; right:38px; z-index:5;
    background:rgba(0,0,0,.55); color:#fff; font-size:11px; font-weight:600;
    padding:5px 10px; border-radius:20px; display:none; cursor:pointer;
  }
  .img-slot.has-img:hover .crop-btn{ display:flex; }
  input[type=file]{ display:none; }

  /* ---------- Swatch chips ---------- */
  .swatch-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .export-empty{ display:none !important; }
  .swatch{ position:relative; }
  .swatch-box{
    width:22px; height:22px; border-radius:50%; border:1px solid rgba(0,0,0,.15);
    cursor:pointer; position:relative; overflow:hidden;
  }
  .swatch-box input[type=color]{ position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:pointer; }
  .swatch-delete{
    position:absolute; top:-6px; right:-6px; width:15px; height:15px; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; font-size:9px; line-height:1; display:none;
    align-items:center; justify-content:center; cursor:pointer; opacity:0; transition:opacity .12s ease;
  }
  .swatch:hover .swatch-delete{ display:flex; opacity:1; }
  .add-swatch-btn{
    width:22px; height:22px; border-radius:50%; border:1.5px dashed var(--line);
    background:transparent; color:var(--ink-soft); font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .12s ease, color .12s ease;
  }
  .add-swatch-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .item-spec{
    font-family:'Pretendard', sans-serif; font-size:11.5px; color:var(--ink-soft); letter-spacing:.01em;
  }

  /* ---------- Crop overlay ---------- */
  .crop-overlay{
    position:fixed; inset:0; background:rgba(20,22,26,.72);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:1000;
  }
  .crop-overlay[hidden]{ display:none; }
  .crop-stage{
    position:relative; overflow:hidden; background:#2A2D33; border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,.4); touch-action:none; cursor:move; user-select:none;
  }
  .crop-stage img{
    position:absolute; top:0; left:0; transform-origin:0 0; pointer-events:none;
    -webkit-user-drag:none; max-width:none;
  }
  .crop-frame{ position:absolute; inset:0; pointer-events:none; border:1.5px solid rgba(255,255,255,.85); border-radius:8px; }
  .crop-controls{
    display:flex; align-items:center; gap:16px; background:#fff; padding:14px 20px;
    border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  .crop-controls .zoom-wrap{ display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; color:var(--ink-soft); }
  .crop-controls input[type=range]{ width:180px; }
  .crop-zoom-val{ min-width:38px; text-align:right; font-variant-numeric:tabular-nums; color:var(--ink); }
  .crop-controls .crop-btn-row{ display:flex; gap:10px; }
  .crop-apply-btn{
    font-weight:600; font-size:14px; background:var(--ink); color:#fff; border:none;
    padding:10px 20px; border-radius:10px; cursor:pointer;
  }
  .crop-apply-btn:hover{ background:var(--accent); }
  .crop-cancel-btn, .crop-reset-btn{
    font-weight:500; font-size:14px; background:transparent; color:var(--ink-soft);
    border:1px solid var(--line); padding:10px 18px; border-radius:10px; cursor:pointer;
  }
  .crop-reset-btn{ margin-right:auto; }
  .crop-cancel-btn:hover, .crop-reset-btn:hover{ border-color:var(--accent); color:var(--accent); }
  @media (max-width: 480px){
    .crop-overlay{ padding:16px; gap:12px; }
    .crop-controls{ flex-direction:column; align-items:stretch; width:100%; max-width:340px; gap:10px; padding:12px 14px; }
    .crop-controls .zoom-wrap{ width:100%; }
    .crop-controls input[type=range]{ width:auto; flex:1 1 auto; }
    .crop-controls .crop-btn-row{ width:100%; gap:8px; }
    .crop-reset-btn, .crop-cancel-btn, .crop-apply-btn{ flex:1 1 0; padding:9px 8px; font-size:12.5px; white-space:nowrap; }
  }

  /* ---------- Custom touch color picker ---------- */
  .ccp-overlay{
    position:fixed; inset:0; background:rgba(28,31,38,.55);
    display:flex; align-items:center; justify-content:center; z-index:200000; padding:20px;
  }
  .ccp-overlay[hidden]{ display:none; }
  body.exporting .ccp-overlay{ display:none !important; }
  .ccp-panel{
    background:#fff; border-radius:16px; padding:20px; width:100%; max-width:300px;
    box-shadow:0 20px 50px rgba(28,31,38,.3); display:flex; flex-direction:column; gap:14px;
  }
  .ccp-title{ font-size:13px; font-weight:700; color:var(--ink-soft); text-align:center; }
  .ccp-canvas-wrap{ position:relative; width:100%; aspect-ratio:1/1; border-radius:12px; overflow:hidden; touch-action:none; border:1px solid var(--line); }
  .ccp-canvas-wrap canvas{ width:100%; height:100%; display:block; }
  .ccp-square-thumb{
    position:absolute; top:0; left:0; width:22px; height:22px; border-radius:50%;
    border:3px solid #fff; box-shadow:0 0 0 1.5px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.3);
    transform:translate(-50%,-50%); pointer-events:none;
  }
  .ccp-hue-wrap{ position:relative; width:100%; height:30px; border-radius:15px; overflow:hidden; touch-action:none; border:1px solid var(--line); }
  .ccp-hue-wrap canvas{ width:100%; height:100%; display:block; }
  .ccp-hue-thumb{
    position:absolute; top:50%; left:0; width:26px; height:26px; border-radius:50%;
    border:3px solid #fff; box-shadow:0 0 0 1.5px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.3);
    transform:translate(-50%,-50%); pointer-events:none; background:transparent;
  }
  .ccp-bottom-row{ display:flex; align-items:center; gap:10px; }
  .ccp-preview{ width:42px; height:42px; border-radius:10px; border:1px solid var(--line); flex:0 0 auto; }
  .ccp-hex-input{
    flex:1 1 auto; min-width:0; font-size:16px; font-weight:600; letter-spacing:.02em; text-transform:uppercase;
    padding:10px 12px; border-radius:10px; border:1px solid var(--line); color:var(--ink-text);
  }
  .ccp-hex-input:focus{ outline:none; border-color:var(--accent); }
  .ccp-actions{ display:flex; gap:10px; }
  .ccp-actions button{ flex:1 1 0; justify-content:center; }

  /* ---------- Size / color dropdown panels ---------- */
  .size-settings, .color-settings, .bg-image-settings{ position:relative; }
  .size-panel, .color-panel{
    position:fixed; background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.14); padding:16px 18px; display:flex; flex-direction:column;
    gap:14px; width:240px; max-width:calc(100vw - 24px); z-index:60;
  }
  .size-panel[hidden], .color-panel[hidden]{ display:none; }
  body.exporting .size-panel, body.exporting .color-panel{ display:none !important; }
  .size-panel label, .color-panel-row{ display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:var(--ink-soft); }
  .size-panel input[type=range]{ width:100%; }
  .size-panel .size-val{ font-size:12px; font-weight:500; color:var(--ink-text); align-self:flex-end; }
  .size-reset-btn{ align-self:stretch; justify-content:center; font-size:12.5px; padding:8px 12px; }
  .layout-toggle-wrap{ display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:var(--ink-soft); }
  .layout-toggle{ display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .layout-opt{
    flex:1 1 0; padding:8px 6px; font-size:11.5px; font-weight:600;
    background:#fff; color:var(--ink-soft); border:none; cursor:pointer;
    font-family:'Pretendard', sans-serif; transition:background .12s ease, color .12s ease;
  }
  .layout-opt + .layout-opt{ border-left:1px solid var(--line); }
  .layout-opt.active{ background:var(--ink); color:#fff; }
  .layout-opt:not(.active):hover{ color:var(--accent); }

  /* ---- "profile on top" layout variant (toggled via the layout picker above) ---- */
  .layout.layout-top{ flex-direction:column; }
  .layout.layout-top .profile-panel{ width:540px; flex:0 0 auto; align-self:center; }
  .layout.layout-top .outfit-panel{ width:100%; }
  .layout.layout-top .profile-panel .panel-body{ flex-direction:row; text-align:left; align-items:center; }
  .color-panel-row{ flex-direction:row; align-items:center; gap:10px; text-align:left; }
  .color-panel-row span:nth-child(2){ flex:1 1 auto; }
  .color-panel-swatch{ width:34px; height:20px; border-radius:6px; border:1px solid var(--line); flex:0 0 auto; cursor:pointer; position:relative; overflow:hidden; }
  .color-panel-row input[type=color]{ position:absolute; inset:0; width:100%; height:100%; opacity:0; }
  .color-panel-row.dot-pattern-row{ padding-top:10px; border-top:1px solid var(--line); }
  .pattern-type-row{
    display:none; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin-top:2px;
  }
  .pattern-type-row.visible{ display:flex; }
  .pattern-type-btn{
    flex:1; padding:7px 4px; font-size:11.5px; font-weight:600; color:var(--ink-soft);
    background:#fff; border:none; border-right:1px solid var(--line); cursor:pointer;
    transition:background .12s ease, color .12s ease;
  }
  .pattern-type-btn:last-child{ border-right:none; }
  .pattern-type-btn:hover{ color:var(--accent); }
  .pattern-type-btn.active{ background:var(--accent-soft); color:var(--accent); }
  .toggle-switch{ position:relative; display:inline-block; width:34px; height:20px; flex:0 0 auto; }
  .toggle-switch input{ position:absolute; opacity:0; width:0; height:0; }
  .toggle-slider{
    position:absolute; inset:0; cursor:pointer; background:var(--line);
    border-radius:999px; transition:background .15s ease;
  }
  .toggle-slider::before{
    content:''; position:absolute; height:14px; width:14px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:transform .15s ease; box-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .toggle-switch input:checked + .toggle-slider{ background:var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before{ transform:translateX(14px); }

<script>
  // ---- Export scale: on-screen stage is a fixed 1400px-wide canvas, but the
  // downloaded PNG is rendered at 2000px wide. Any px number shown to the user
  // (ruler ticks, alignment-guide labels, size-panel values) should read as the
  // pixel size it will actually come out to in that 2000px export, not the raw
  // on-screen CSS px — so every display value is multiplied by this factor.
  const EXPORT_TARGET_WIDTH = 2000;
  function getExportScale(){
    const stageEl = document.getElementById('stage');
    const w = stageEl ? stageEl.getBoundingClientRect().width : 0;
    return w > 0 ? EXPORT_TARGET_WIDTH / w : 1;
  }
  function toExportPx(cssPx){
    return Math.round(cssPx * getExportScale());
  }

  // ---- Menu collapse (mobile) ----
  document.getElementById('menuToggleBtn').addEventListener('click', () => {
    document.body.classList.toggle('menu-collapsed');
  });

  // ---- Shared dropdown-panel positioning (size/color panels) ----
  // Fixed + JS-computed so a wide panel never spills off the left edge on a
  // narrow phone once the toolbar wraps and pushes its button toward the
  // right side of the screen.
  function positionDropdownPanel(panel, btn){
    const btnRect = btn.getBoundingClientRect();
    const margin = 12;
    const panelWidth = panel.getBoundingClientRect().width;
    const desiredLeft = btnRect.right - panelWidth;
    const maxLeft = Math.max(margin, window.innerWidth - panelWidth - margin);
    const left = Math.min(Math.max(desiredLeft, margin), maxLeft);
    panel.style.top = `${btnRect.bottom + 8}px`;
    panel.style.left = `${left}px`;
    panel.style.right = 'auto';
  }

  // ---- Generic image slot system (upload, crop, clear) ----
  function setSlotImage(slot, dataUrl, crop){
    const placeholder = slot.querySelector('.placeholder');
    const probe = new Image();
    probe.onload = () => {
      slot._sourceImage = probe;
      slot._dataUrl = dataUrl;
      slot.classList.add('has-img');
      if(placeholder) placeholder.style.display = 'none';
      if(crop && typeof crop === 'object'){
        slot._crop = crop;
      }else{
        const boxW = slot.clientWidth;
        const boxH = slot.clientHeight;
        const fitsAsIs = probe.naturalWidth <= boxW && probe.naturalHeight <= boxH;
        slot._crop = fitsAsIs ? { mode: 'original' } : { mode: 'cover' };
      }
      renderSlot(slot);
    };
    probe.src = dataUrl;
  }

  function renderSlot(slot){
    const img = slot._sourceImage;
    if(!img) return;
    const boxW = slot.clientWidth;
    const boxH = slot.clientHeight;
    const crop = slot._crop || { mode: 'cover' };
    let photoSize, photoPos;
    if(crop.mode === 'original'){
      photoSize = `${img.naturalWidth}px ${img.naturalHeight}px`;
      photoPos = 'center';
    }else if(crop.mode === 'custom'){
      const coverScale = Math.max(boxW / img.naturalWidth, boxH / img.naturalHeight);
      const drawScale = coverScale * (crop.zoom || 1);
      const dispW = img.naturalWidth * drawScale;
      const dispH = img.naturalHeight * drawScale;
      let posX = boxW / 2 - crop.fx * dispW;
      let posY = boxH / 2 - crop.fy * dispH;
      if(dispW >= boxW){ posX = Math.min(0, Math.max(boxW - dispW, posX)); }
      else{ posX = (boxW - dispW) / 2; }
      if(dispH >= boxH){ posY = Math.min(0, Math.max(boxH - dispH, posY)); }
      else{ posY = (boxH - dispH) / 2; }
      photoSize = `${dispW}px ${dispH}px`;
      photoPos = `${posX}px ${posY}px`;
    }else{
      photoSize = 'cover';
      photoPos = 'center';
    }
    slot.style.backgroundImage = `url(${slot._dataUrl})`;
    slot.style.backgroundSize = photoSize;
    slot.style.backgroundPosition = photoPos;
    slot.style.backgroundRepeat = 'no-repeat';
  }

  function rerenderAllSlots(){
    document.querySelectorAll('.img-slot.has-img').forEach(renderSlot);
  }

  function clearSlotImage(slot){
    const placeholder = slot.querySelector('.placeholder');
    const input = slot.querySelector('input[type=file]');
    slot.style.backgroundImage = '';
    slot.style.backgroundSize = '';
    slot.style.backgroundPosition = '';
    slot.classList.remove('has-img');
    if(placeholder) placeholder.style.display = 'flex';
    if(input) input.value = '';
    slot._sourceImage = null;
    slot._crop = null;
    slot._dataUrl = null;
  }

  function wireImgSlot(slot){
    if(slot._wired) return;
    slot._wired = true;
    const input = slot.querySelector('input[type=file]');
    const clearBtn = slot.querySelector('.clear-btn');
    const cropBtn = slot.querySelector('.crop-btn');

    slot.addEventListener('click', (e) => {
      if(e.target === clearBtn || clearBtn.contains(e.target) || e.target === cropBtn || e.target.closest('.slot-caption')) return;
      input.click();
    });
    input.addEventListener('change', () => {
      const file = input.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => setSlotImage(slot, ev.target.result);
      reader.readAsDataURL(file);
    });
    clearBtn.addEventListener('click', (e) => { e.stopPropagation(); clearSlotImage(slot); });
    cropBtn.addEventListener('click', (e) => { e.stopPropagation(); openCropEditor(slot); });
    slot.addEventListener('dragover', (e) => e.preventDefault());
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if(file && file.type.startsWith('image/')){
        input.files = e.dataTransfer.files;
        input.dispatchEvent(new Event('change'));
      }
    });
  }
  document.querySelectorAll('.img-slot').forEach(wireImgSlot);

  // ---- Crop editor ----
  const cropOverlay = document.getElementById('cropOverlay');
  const cropStage = document.getElementById('cropStage');
  const cropImage = document.getElementById('cropImage');
  const cropZoom = document.getElementById('cropZoom');
  const cropZoomVal = document.getElementById('cropZoomVal');
  function updateCropZoomLabel(){ cropZoomVal.textContent = Math.round((cropState.zoom || 1) * 100) + '%'; }
  let cropTarget = null, cropCoverScale = 1;
  let cropState = { zoom: 1, x: 0, y: 0 };
  let cropFrameW = 0, cropFrameH = 0, cropNatW = 0, cropNatH = 0;

  function openCropEditor(slot){
    if(!slot._sourceImage || !slot._dataUrl) return;
    cropTarget = slot;
    cropNatW = slot._sourceImage.naturalWidth;
    cropNatH = slot._sourceImage.naturalHeight;
    const boxW = slot.clientWidth, boxH = slot.clientHeight;
    const ratio = boxW / boxH;
    const maxW = Math.min(560, window.innerWidth - 60);
    const controlsReserve = window.innerWidth <= 480 ? 280 : 220;
    const maxH = Math.min(560, window.innerHeight - controlsReserve);
    if(maxW / maxH > ratio){ cropFrameH = maxH; cropFrameW = maxH * ratio; }
    else{ cropFrameW = maxW; cropFrameH = maxW / ratio; }
    cropStage.style.width = cropFrameW + 'px';
    cropStage.style.height = cropFrameH + 'px';
    cropImage.src = slot._dataUrl;
    cropCoverScale = Math.max(cropFrameW / cropNatW, cropFrameH / cropNatH);
    cropZoom.min = 0.5;
    const c = slot._crop;
    if(c && c.mode === 'custom'){
      cropState.zoom = c.zoom || 1;
      const drawScale = cropCoverScale * cropState.zoom;
      const dispW = cropNatW * drawScale, dispH = cropNatH * drawScale;
      cropState.x = cropFrameW / 2 - c.fx * dispW;
      cropState.y = cropFrameH / 2 - c.fy * dispH;
    }else{
      cropState.zoom = 1;
      const dispW = cropNatW * cropCoverScale, dispH = cropNatH * cropCoverScale;
      cropState.x = (cropFrameW - dispW) / 2;
      cropState.y = (cropFrameH - dispH) / 2;
    }
    cropZoom.value = cropState.zoom;
    updateCropZoomLabel();
    clampCrop();
    applyCropTransform();
    cropOverlay.hidden = false;
  }
  function applyCropTransform(){
    const drawScale = cropCoverScale * cropState.zoom;
    cropImage.style.width = (cropNatW * drawScale) + 'px';
    cropImage.style.height = (cropNatH * drawScale) + 'px';
    cropImage.style.transform = `translate(${cropState.x}px, ${cropState.y}px)`;
  }
  function clampCrop(){
    const drawScale = cropCoverScale * cropState.zoom;
    const dispW = cropNatW * drawScale, dispH = cropNatH * drawScale;
    if(dispW >= cropFrameW){ cropState.x = Math.min(0, Math.max(cropFrameW - dispW, cropState.x)); }
    else{ cropState.x = (cropFrameW - dispW) / 2; }
    if(dispH >= cropFrameH){ cropState.y = Math.min(0, Math.max(cropFrameH - dispH, cropState.y)); }
    else{ cropState.y = (cropFrameH - dispH) / 2; }
  }
  cropZoom.addEventListener('input', () => {
    const oldScale = cropCoverScale * cropState.zoom;
    const cx = (cropFrameW / 2 - cropState.x) / oldScale;
    const cy = (cropFrameH / 2 - cropState.y) / oldScale;
    cropState.zoom = parseFloat(cropZoom.value);
    const newScale = cropCoverScale * cropState.zoom;
    cropState.x = cropFrameW / 2 - cx * newScale;
    cropState.y = cropFrameH / 2 - cy * newScale;
    clampCrop(); applyCropTransform(); updateCropZoomLabel();
  });
  let cropDragging = false, cropStartX = 0, cropStartY = 0, cropOrigX = 0, cropOrigY = 0;
  cropStage.addEventListener('pointerdown', (e) => {
    cropDragging = true; cropStartX = e.clientX; cropStartY = e.clientY;
    cropOrigX = cropState.x; cropOrigY = cropState.y;
    cropStage.setPointerCapture(e.pointerId);
  });
  cropStage.addEventListener('pointermove', (e) => {
    if(!cropDragging) return;
    cropState.x = cropOrigX + (e.clientX - cropStartX);
    cropState.y = cropOrigY + (e.clientY - cropStartY);
    clampCrop(); applyCropTransform();
  });
  cropStage.addEventListener('pointerup', () => { cropDragging = false; });
  cropStage.addEventListener('pointercancel', () => { cropDragging = false; });
  function closeCropEditor(){ cropOverlay.hidden = true; cropTarget = null; cropImage.src = ''; }
  document.getElementById('cropCancelBtn').addEventListener('click', closeCropEditor);
  document.getElementById('cropResetBtn').addEventListener('click', () => {
    cropState.zoom = 1;
    const dispW = cropNatW * cropCoverScale, dispH = cropNatH * cropCoverScale;
    cropState.x = (cropFrameW - dispW) / 2;
    cropState.y = (cropFrameH - dispH) / 2;
    cropZoom.value = 1;
    updateCropZoomLabel(); clampCrop(); applyCropTransform();
  });
  document.getElementById('cropApplyBtn').addEventListener('click', () => {
    if(!cropTarget) return;
    const drawScale = cropCoverScale * cropState.zoom;
    const dispW = cropNatW * drawScale, dispH = cropNatH * drawScale;

    el.addEventListener('focus', function selectAllOnFirstFocus(){
      const range = document.createRange();

      sel.removeAllRanges();
      sel.addRange(range);
    }, { once: true });
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){

      // markup) behind after the last character is deleted, which breaks the

      if(el.textContent.trim() === '' && el.innerHTML !== '') el.innerHTML = '';

  function getHexBrightness(hex){
    const m = hex.replace('#', '');
    const r = parseInt(m.substring(0, 2), 16);
    const g = parseInt(m.substring(2, 4), 16);
    const b = parseInt(m.substring(4, 6), 16);
    return (r * 299 + g * 587 + b * 114) / 1000;

  const dotPatternToggle = document.getElementById('dotPatternToggle');

  let bgPatternType = 'dot';
  function makePatternTileDataUrl(type, dotColor, lineColor, tileW, tileH){
    const scale = 3; // supersample so the tile still looks crisp at export resolution
    const c = document.createElement('canvas');
    c.width = tileW * scale;
    c.height = tileH * scale;
    const cctx = c.getContext('2d');
    if(type === 'grid'){
      cctx.fillStyle = lineColor;
      cctx.fillRect(0, 0, c.width, scale);
      cctx.fillRect(0, 0, scale, c.height);
    }else if(type === 'lines'){
      cctx.fillStyle = lineColor;
      cctx.fillRect(0, 0, c.width, scale);
    }else{
      cctx.fillStyle = dotColor;
      cctx.beginPath();
      cctx.arc(c.width / 2, c.height / 2, 1.2 * scale, 0, Math.PI * 2);
      cctx.fill();
    }
    return c.toDataURL('image/png');
  }
  function applyBgPattern(){
    patternTypeRow.classList.toggle('visible', dotPatternToggle.checked);

    // dark — same white-to-charcoal contrast logic as the panel header text.
    const hex = document.getElementById('pageColor').value;
    const dark = getHexBrightness(hex) < 140;
    const dotColor = dark ? 'rgba(255,255,255,.22)' : 'rgba(30,30,30,.14)';
    const lineColor = dark ? 'rgba(255,255,255,.16)' : 'rgba(30,30,30,.10)';
    let tileW, tileH, size;

  function loadDownscaledImage(file, maxDim, quality){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if(width > maxDim || height > maxDim){
            if(width >= height){
              height = Math.round(height * (maxDim / width));
              width = maxDim;
            }else{
              width = Math.round(width * (maxDim / height));
              height = maxDim;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('image decode failed'));
        img.src = ev.target.result;
      };
      reader.onerror = () => reject(new Error('file read failed'));
      reader.readAsDataURL(file);
    });
  }

  let stickerZ = 100;

  function sendStickerToBack(el){
    const others = Array.from(document.querySelectorAll('.sticker')).filter(s => s !== el);
    const minZ = others.length ? Math.min(...others.map(s => parseInt(s.style.zIndex) || 0)) : stickerZ;

  function createSticker(dataUrl, opts){
    opts = opts || {};
    const stage = document.getElementById('stage');
    const probe = new Image();
    probe.onload = () => {
      const maxDim = 180;
      const scale = Math.min(1, maxDim / Math.max(probe.naturalWidth, probe.naturalHeight));
      const naturalW = Math.round(probe.naturalWidth * scale);
      const naturalH = Math.round(probe.naturalHeight * scale);
      const width = opts.width || naturalW;
      const height = opts.height || naturalH;
      const x = opts.x != null ? opts.x : Math.round((stage.clientWidth - width) / 2);
      const y = opts.y != null ? opts.y : Math.round((stage.clientHeight - height) / 2);

      const el = document.createElement('div');
      el.className = 'sticker';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = width + 'px';
      el.style.height = height + 'px';
      if(typeof opts.zIndex === 'number' && !Number.isNaN(opts.zIndex)){
        el.style.zIndex = opts.zIndex;
        stickerZ = Math.max(stickerZ, opts.zIndex);
      }else{
        el.style.zIndex = ++stickerZ;
      }
      el.dataset.dataUrl = dataUrl;
      const rotation = typeof opts.rotation === 'number' && !Number.isNaN(opts.rotation) ? opts.rotation : 0;
      el.dataset.rotation = rotation;
      if(rotation) el.style.transform = 'rotate(' + rotation + 'deg)';

      const img = document.createElement('img');
      img.src = dataUrl;
      img.draggable = false;
      el.appendChild(img);

      delBtn.className = 'sticker-delete';
      delBtn.title = '스티커 삭제';
      delBtn.textContent = '\u00d7';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); el.remove(); });
      el.appendChild(delBtn);

      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'sticker-resize';
      resizeHandle.title = '드래그해서 크기 조절';
      el.appendChild(resizeHandle);

      const rotateHandle = document.createElement('div');
      rotateHandle.className = 'sticker-rotate';
      rotateHandle.title = '드래그해서 회전 (더블클릭: 초기화)';
      rotateHandle.innerHTML = ICON_ROTATE;
      rotateHandle.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        el.dataset.rotation = 0;
        el.style.transform = 'rotate(0deg)';

      lockBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const locked = el.classList.toggle('locked');
        lockBtn.innerHTML = locked ? ICON_LOCK_CLOSED : ICON_LOCK_OPEN;
        lockBtn.title = locked ? '잠금 해제' : '잠금 (스티커 임시 비활성화)';
      });
      el.appendChild(lockBtn);
      if(opts.locked){
        el.classList.add('locked');
        lockBtn.innerHTML = ICON_LOCK_CLOSED;
        lockBtn.title = '잠금 해제';

      const backBtn = document.createElement('div');

  function makeStickerInteractive(el, resizeHandle, rotateHandle){
    let dragging = false, resizing = false, rotating = false;
    let startX = 0, startY = 0, startLeft = 0, startTop = 0, startW = 0, startH = 0;
    let startAngle = 0, startRotation = 0;

    el.addEventListener('pointerdown', (e) => {
      if(e.target === resizeHandle || e.target.closest('.sticker-delete') || e.target.closest('.sticker-border-toggle') || e.target.closest('.sticker-lock-btn') || e.target.closest('.sticker-back-btn')) return;
      dragging = true;
      el.classList.add('sticker-active');
      el.style.zIndex = ++stickerZ;
      startX = e.clientX;
      startY = e.clientY;
      startLeft = parseFloat(el.style.left) || 0;
      startTop = parseFloat(el.style.top) || 0;
      el.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    el.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      el.style.left = (startLeft + (e.clientX - startX)) + 'px';
      el.style.top = (startTop + (e.clientY - startY)) + 'px';
    });
    el.addEventListener('pointerup', () => { dragging = false; el.classList.remove('sticker-active'); });
    el.addEventListener('pointercancel', () => { dragging = false; el.classList.remove('sticker-active'); });

    resizeHandle.addEventListener('pointerdown', (e) => {
      resizing = true;
      el.classList.add('sticker-active');
      startX = e.clientX;
      startY = e.clientY;
      startW = el.offsetWidth;
      startH = el.offsetHeight;
      resizeHandle.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    resizeHandle.addEventListener('pointermove', (e) => {
      if(!resizing) return;
      const angleRad = ((parseFloat(el.dataset.rotation) || 0) * Math.PI) / 180;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      const localDx = dx * Math.cos(angleRad) + dy * Math.sin(angleRad);
      const scale = Math.max(0.2, (startW + localDx) / startW);
      el.style.width = Math.max(30, Math.round(startW * scale)) + 'px';
      el.style.height = Math.max(30, Math.round(startH * scale)) + 'px';
      e.stopPropagation();
    });
    resizeHandle.addEventListener('pointerup', () => { resizing = false; el.classList.remove('sticker-active'); });
    resizeHandle.addEventListener('pointercancel', () => { resizing = false; el.classList.remove('sticker-active'); });

    if(rotateHandle){
      rotateHandle.addEventListener('pointerdown', (e) => {
        rotating = true;
        el.classList.add('sticker-active');
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        startAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        startRotation = parseFloat(el.dataset.rotation) || 0;
        rotateHandle.setPointerCapture(e.pointerId);
        e.stopPropagation();
      });
      rotateHandle.addEventListener('pointermove', (e) => {
        if(!rotating) return;
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        let newRotation = startRotation + (angle - startAngle);
        if(e.shiftKey) newRotation = Math.round(newRotation / 15) * 15;
        el.dataset.rotation = newRotation;
        el.style.transform = 'rotate(' + newRotation + 'deg)';
        e.stopPropagation();
      });
      rotateHandle.addEventListener('pointerup', () => { rotating = false; el.classList.remove('sticker-active'); });
      rotateHandle.addEventListener('pointercancel', () => { rotating = false; el.classList.remove('sticker-active'); });
    }
  }

    const newH = Math.max(minH, needed);
    if(Math.abs(newH - el.offsetHeight) > 1){
      el.style.height = newH + 'px';

  // ---- Ruler & alignment guides ----
  const rulerToggleBtn = document.getElementById('rulerToggleBtn');

  let rulersBuilt = false;

  function buildRulerTicks(){
    const stageEl = document.getElementById('stage');
    const w = stageEl.clientWidth, h = stageEl.clientHeight;
    rulerTop.innerHTML = '';
    rulerLeft.innerHTML = '';
    const scale = getExportScale();
    // Step through round 2000px-export values (0, 50, 100, 150px...) and convert
    // each back to its on-screen position, rather than stepping evenly through
    // screen px and relabeling — that older approach produced clean-looking but
    // arbitrary tick spacing with awkward labels like "143px" / "286px" instead
    // of the round export-pixel values a ruler should actually read.
    const exportW = w * scale, exportH = h * scale;
    for(let ex = 0; ex <= exportW; ex += 50){
      const tick = document.createElement('div');
      tick.className = 'ruler-tick';
      tick.style.left = (ex / scale) + 'px';
      tick.textContent = ex % 100 === 0 ? ex : '';
      rulerTop.appendChild(tick);
    }
    for(let ey = 0; ey <= exportH; ey += 50){
      const tick = document.createElement('div');
      tick.className = 'ruler-tick';
      tick.style.top = (ey / scale) + 'px';
      tick.textContent = ey % 100 === 0 ? ey : '';
      rulerLeft.appendChild(tick);
    }
    rulersBuilt = true;
  }

  function createGuide(type, pos){
    const stageEl = document.getElementById('stage');
    const el = document.createElement('div');
    el.className = type === 'h' ? 'guide-h' : 'guide-v';
    if(type === 'h') el.style.top = pos + 'px'; else el.style.left = pos + 'px';

    const hit = document.createElement('div');
    hit.className = 'guide-hit';
    el.appendChild(hit);

    const label = document.createElement('div');
    label.className = 'guide-label';
    label.textContent = toExportPx(pos) + 'px';
    el.appendChild(label);

    guideLayer.appendChild(el);

    let dragging = false, startClient = 0, startPos = 0;
    hit.addEventListener('pointerdown', (e) => {
      dragging = true;
      el.classList.add('guide-dragging');
      startClient = type === 'h' ? e.clientY : e.clientX;
      startPos = type === 'h' ? (parseFloat(el.style.top) || 0) : (parseFloat(el.style.left) || 0);
      hit.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    hit.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      const client = type === 'h' ? e.clientY : e.clientX;
      let livePos = startPos + (client - startClient);
      const max = type === 'h' ? stageEl.clientHeight : stageEl.clientWidth;
      livePos = Math.max(0, Math.min(max, livePos));
      if(type === 'h') el.style.top = livePos + 'px'; else el.style.left = livePos + 'px';
      label.textContent = toExportPx(livePos) + 'px';
      e.stopPropagation();
    });
    hit.addEventListener('pointerup', () => { dragging = false; el.classList.remove('guide-dragging'); });
    hit.addEventListener('pointercancel', () => { dragging = false; el.classList.remove('guide-dragging'); });
    hit.addEventListener('dblclick', (e) => { e.stopPropagation(); el.remove(); });
    return el;
  }

  function startGuideDrag(type, startEvent){
    const stageEl = document.getElementById('stage');
    const guide = createGuide(type, 0);
    guide.classList.add('guide-dragging');
    const move = (e) => {
      const r = stageEl.getBoundingClientRect();
      let pos = type === 'h' ? (e.clientY - r.top) : (e.clientX - r.left);
      const max = type === 'h' ? stageEl.clientHeight : stageEl.clientWidth;
      pos = Math.max(0, Math.min(max, pos));
      if(type === 'h') guide.style.top = pos + 'px'; else guide.style.left = pos + 'px';
      guide.querySelector('.guide-label').textContent = toExportPx(pos) + 'px';
    };
    const up = (e) => {
      move(e);
      guide.classList.remove('guide-dragging');
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    move(startEvent);
  }

      })),

  function applyState(data){
    document.querySelector('.p-name').innerHTML = data.profile.name || '';
    document.querySelector('.p-tag').innerHTML = data.profile.tag || '';
    document.querySelector('.p-desc').innerHTML = data.profile.desc || '';
    document.querySelector('.profile-panel .slot-caption').innerHTML = data.profile.caption || '';
    wireSlotCaption(document.querySelector('.profile-panel .slot-caption'));
    const profileSlot = document.querySelector('.img-slot.square');
    clearSlotImage(profileSlot);
    if(data.profile.image) setSlotImage(profileSlot, data.profile.image, data.profile.crop);

    outfitGrid.querySelectorAll('.card').forEach(c => c.remove());
    const addBtn = document.getElementById('addItemCard');
    (data.items || []).forEach(itemData => {
      const card = createOutfitCard();
      outfitGrid.insertBefore(card, addBtn);
      card.querySelector('.item-label').innerHTML = itemData.label || '';
      card.querySelector('.item-spec').innerHTML = itemData.spec || '';
      card.querySelector('.slot-caption').innerHTML = itemData.caption || '';
      wireSlotCaption(card.querySelector('.slot-caption'));
      const row = card.querySelector('.swatch-row');
      const abtn = row.querySelector('.add-swatch-btn');
      (itemData.swatches || []).forEach(hex => row.insertBefore(createSwatchChip(hex), abtn));
      const slot = card.querySelector('.img-slot');
      if(itemData.image) setSlotImage(slot, itemData.image, itemData.crop);
    });
    renumberItems();

    document.querySelectorAll('.sticker').forEach(el => el.remove());
    if(Array.isArray(data.stickers)){
      data.stickers.forEach(s => {
        if(s && s.dataUrl){
          createSticker(s.dataUrl, { x: s.x, y: s.y, width: s.width, height: s.height, hasBorder: !!s.hasBorder, locked: !!s.locked, zIndex: s.zIndex, rotation: typeof s.rotation === 'number' ? s.rotation : 0 });
        }
      });
    }

    document.querySelectorAll('.textbox').forEach(el => el.remove());
    if(Array.isArray(data.textboxes)){
      data.textboxes.forEach(t => {
        if(t){
          createTextBox({ text: t.text, style: t.style, x: t.x, y: t.y, width: t.width, height: t.height, locked: !!t.locked, zIndex: t.zIndex });
        }
      });
    }

    // Guides are a temporary editing aid, not part of the saved sheet — clear them on load/reset.
    guideLayer.innerHTML = '';

    if(data.sizes){
      profileSizeRange.value = data.sizes.profileSize || 220;
      outfitColsRange.value = data.sizes.outfitCols || 3;
      outfitHeightRange.value = data.sizes.outfitHeight || 530;
      profileSizeRange.dispatchEvent(new Event('input'));
      outfitColsRange.dispatchEvent(new Event('input'));
      outfitHeightRange.dispatchEvent(new Event('input'));
      setLayoutMode(data.sizes.layout === 'top' ? 'top' : 'side');
    }
    if(data.colors){
      const setC = (id, hex) => { const el = document.getElementById(id); el.value = hex; el.dispatchEvent(new Event('input')); };
      if(data.colors.profileSlot) setC('profileSlotColor', data.colors.profileSlot);
      if(data.colors.outfitSlot) setC('outfitSlotColor', data.colors.outfitSlot);
      if(data.colors.panelHead) setC('panelHeadColor', data.colors.panelHead);
      if(data.colors.panelBg) setC('panelBgColor', data.colors.panelBg);
      if(data.colors.page) setC('pageColor', data.colors.page);
    }
    setStageBgImage(data.bgImage || null);
    bgImageBlurRange.value = data.bgImageBlur != null ? data.bgImageBlur : 0;
    bgImageBlurRange.dispatchEvent(new Event('input'));
    bgImageOpacityRange.value = data.bgImageOpacity != null ? data.bgImageOpacity : 100;
    bgImageOpacityRange.dispatchEvent(new Event('input'));
    dotPatternToggle.checked = !!data.dotPattern;
    bgPatternType = ['dot', 'grid', 'lines'].includes(data.bgPatternType) ? data.bgPatternType : 'dot';
    document.querySelectorAll('.pattern-type-btn').forEach(b => b.classList.toggle('active', b.dataset.pattern === bgPatternType));

  (function setupCustomColorPicker(){
    const overlay = document.getElementById('ccpOverlay');

    const squareThumb = document.getElementById('ccpSquareThumb');
    const squareWrap = document.getElementById('ccpSquareWrap');
    const hueCanvas = document.getElementById('ccpHue');
    const hueThumb = document.getElementById('ccpHueThumb');
    const hueWrap = document.getElementById('ccpHueWrap');
    const preview = document.getElementById('ccpPreview');
    const hexInput = document.getElementById('ccpHexInput');

    const applyBtn = document.getElementById('ccpApplyBtn');

    const hueCtx = hueCanvas.getContext('2d');

    let activeInput = null, draggingSquare = false, draggingHue = false;

    function hsvToHex(h, s, v){
      const c = v * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = v - c;
      let r=0,g=0,b=0;
      if(h < 60){ r=c; g=x; b=0; } else if(h < 120){ r=x; g=c; b=0; }
      else if(h < 180){ r=0; g=c; b=x; } else if(h < 240){ r=0; g=x; b=c; }
      else if(h < 300){ r=x; g=0; b=c; } else { r=c; g=0; b=x; }
      const toHex = n => Math.round((n + m) * 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
    }
    function hexToHsv(hex){
      hex = (hex || '#000000').replace('#', '');
      if(hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      if(hex.length !== 6) hex = '000000';
      const r = parseInt(hex.substring(0,2),16)/255, g = parseInt(hex.substring(2,4),16)/255, b = parseInt(hex.substring(4,6),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      let h = 0;
      if(d !== 0){
        if(max === r) h = 60 * (((g-b)/d) % 6);
        else if(max === g) h = 60 * ((b-r)/d + 2);
        else h = 60 * ((r-g)/d + 4);

      const s = max === 0 ? 0 : d / max;

      for(let i=0;i<=6;i++) grad.addColorStop(i/6, `hsl(${i*60},100%,50%)`);

      squareThumb.style.top = `${(1-val)*sr.height}px`;

      hueThumb.style.left = `${(hue/360)*hr.width}px`;

    function pointFromEvent(e, rect){
      return { x: Math.min(Math.max(e.clientX-rect.left,0),rect.width), y: Math.min(Math.max(e.clientY-rect.top,0),rect.height) };

      const p = pointFromEvent(e, rect);
      sat = rect.width === 0 ? 0 : p.x/rect.width;

    }
    function handleHuePointer(e){
      const rect = hueWrap.getBoundingClientRect();

    squareWrap.addEventListener('pointermove', (e) => { if(draggingSquare) handleSquarePointer(e); });
    squareWrap.addEventListener('pointerup', () => { draggingSquare = false; });
    squareWrap.addEventListener('pointercancel', () => { draggingSquare = false; });
    hueWrap.addEventListener('pointerdown', (e) => { draggingHue = true; hueWrap.setPointerCapture(e.pointerId); handleHuePointer(e); });

    applyBtn.addEventListener('click', () => {

  document.getElementById('downloadBtn').addEventListener('click', async () => {

    const emptySwatchRows = Array.from(document.querySelectorAll('.swatch-row')).filter(row => !row.querySelector('.swatch'));
    const emptyTextFields = Array.from(document.querySelectorAll('.p-desc, .item-spec')).filter(el => el.textContent.trim() === '');
    emptySwatchRows.forEach(row => row.classList.add('export-empty'));

      // Export at a fixed, higher resolution than the live editing canvas so
      // downloads come out sharp and roughly 2000px wide, without needing to
      // shrink the actual editing view (which stays exactly as comfortable

      const targetWidth = 2000;
      const targetHeight = Math.round(bigCanvas.height * (targetWidth / bigCanvas.width));

      canvas.height = targetHeight;

        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + w, y, x + w, y + h, r);
        context.arcTo(x + w, y + h, x, y + h, r);
        context.arcTo(x, y + h, x, y, r);
        context.arcTo(x, y, x + w, y, r);
        context.closePath();

        const img = slot._sourceImage;

        const r = slot.getBoundingClientRect();
        if(r.width === 0 || r.height === 0) return;
        const boxX = (r.left - stageRect.left) * scaleFactor;
        const boxY = (r.top - stageRect.top) * scaleFactor;

          const dh = img.naturalHeight * scaleFactor;

          const dy = boxY + (boxH - dh) / 2;

        const boxY = (r.top - stageRect.top) * scaleFactor;

        const dx = (r.left - stageRect.left) * scaleFactor;
        const dy = (r.top - stageRect.top) * scaleFactor;
        const dw = r.width * scaleFactor;
        const dh = r.height * scaleFactor;

      // (unrotated) bounding rect keeps postit rotation corners and speech
      // -bubble tails, which poke outside that rect, from being cropped off.

      const TEXTBOX_PAD = 40; // css px

        if(sy < 0){ const cut = -sy; const ratio = cut / sh; sy = 0; sh -= cut; dy += dh * ratio; dh -= dh * ratio; }
        if(sx + sw > bigCanvas.width){ const over = (sx + sw) - bigCanvas.width; const ratio = over / sw; sw -= over; dw -= dw * ratio; }
        if(sy + sh > bigCanvas.height){ const over = (sy + sh) - bigCanvas.height; const ratio = over / sh; sh -= over; dh -= dh * ratio; }

        ctx.drawImage(bigCanvas, sx, sy, sw, sh, dx, dy, dw, dh);
      }
      document.querySelectorAll('.textbox').forEach(el => {
        const r = el.getBoundingClientRect();

      // only the blurred shadow back to the correct on-canvas position. A

        const cy = (r.top + r.height / 2 - stageRect.top) * scaleFactor;
        const halfW = (content.offsetWidth / 2) * scaleFactor;
        const halfH = (content.offsetHeight / 2) * scaleFactor;
        let angle = 0;
        const m = (cs.transform || '').match(/matrix\(([^)]+)\)/);

        }

          const off = { x: offsetX * Math.cos(angle) - offsetY * Math.sin(angle), y: offsetX * Math.sin(angle) + offsetY * Math.cos(angle) };

        const OFFSCREEN = 4000;

        [{ dx: 0, dy: 4, blur: 12, alpha: 0.18 }, { dx: 0, dy: 1, blur: 3, alpha: 0.12 }].forEach(layer => {

          ctx.beginPath();
          ctx.rect(0, 0, canvas.width, canvas.height);
          pathFromCorners(ownCorners);
          ctx.clip('evenodd');
          const shifted = rectCorners(layer.dx, layer.dy).map(pt => ({ x: pt.x + OFFSCREEN, y: pt.y + OFFSCREEN }));
          ctx.shadowColor = `rgba(0,0,0,${layer.alpha})`;
          ctx.shadowBlur = layer.blur * scaleFactor;
          ctx.shadowOffsetX = -OFFSCREEN;
          ctx.shadowOffsetY = -OFFSCREEN;
          ctx.fillStyle = 'rgba(0,0,0,1)';
          ctx.beginPath();
          pathFromCorners(shifted);
          ctx.fill();
          ctx.restore();
        });
      });

      const nameText = document.querySelector('.p-name').textContent.trim() || '캐릭터';
      const link = document.createElement('a');
      link.download = `${nameText}_룩북.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }catch(err){
      alert('이미지를 만드는 중 문제가 발생했습니다. 다시 시도해주세요.');
      console.error(err);
    }finally{
      emptySwatchRows.forEach(row => row.classList.remove('export-empty'));
      emptyTextFields.forEach(el => el.classList.remove('export-empty'));
      document.body.classList.remove('exporting');
      labelEl.textContent = originalLabel;
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
